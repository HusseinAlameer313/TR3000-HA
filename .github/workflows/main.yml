name: Build TR3000

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
        g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

    - name: Clone source
      run: |
        git clone --depth 1 https://github.com/immortalwrt/immortalwrt
        cd immortalwrt
        cp ../feeds.conf.default feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Add Passwall
      run: |
        cd immortalwrt/package
        git clone --depth 1 https://github.com/xiaorouji/openwrt-passwall
        git clone --depth 1 https://github.com/xiaorouji/openwrt-passwall-packages

    - name: Load config
      run: |
        cd immortalwrt
        cp ../.config .config
        make defconfig

    - name: Download
      run: |
        cd immortalwrt
        make download -j8

    - name: Build
      run: |
        cd immortalwrt
        make -j$(nproc) || make -j1

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: immortalwrt/bin/targets/
